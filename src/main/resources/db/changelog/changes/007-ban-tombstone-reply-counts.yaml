databaseChangeLog:
  - changeSet:
      id: recalculate-reply-count-for-ban-tombstones
      author: ttg
      comment: >-
        Скрытый при блокировке автора комментарий с опубликованными ответами теперь
        остаётся в выдаче надгробием — наравне с удалённым. Значит, HIDDEN_BY_BAN-
        строкам нужны актуальные счётчики: по total_reply_count > 0 выборки решают,
        показывать ли надгробие, а reply_count даёт «N ответов». До сих пор счётчики
        таких строк замораживались на момент бана, потому что оба пересчёта их
        пропускали. Запрос повторяет recalculateReplyCounts из CommentRepository.
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: >-
              UPDATE comment.comments t
              SET reply_count = child_counts.cnt
              FROM (
                  SELECT p.id AS parent_id, COUNT(child.id) AS cnt
                  FROM comment.comments p
                  LEFT JOIN comment.comments child
                         ON child.parent_id = p.id AND child.status = 'PUBLISHED'
                  WHERE p.status IN ('PUBLISHED', 'DELETED', 'HIDDEN_BY_BAN')
                  GROUP BY p.id
              ) child_counts
              WHERE t.id = child_counts.parent_id
                AND t.reply_count <> child_counts.cnt;

  - changeSet:
      id: recalculate-total-reply-count-for-ban-tombstones
      author: ttg
      comment: >-
        total_reply_count по новой семантике: число опубликованных потомков,
        достижимых по цепочке из PUBLISHED- и надгробных узлов, где надгробными
        стали оба скрывающих без обрыва ветки статуса — DELETED и HIDDEN_BY_BAN.
        Раньше бан обрывал рекурсию, и опубликованные ответы под комментарием
        забаненного выпадали из счётчиков предков вместе с ним. Побочный эффект
        пересчёта — ровно то, ради чего он и делается: комментарии забаненных
        авторов, под которыми остались живые ответы, становятся надгробиями,
        и эти ветки возвращаются в выдачу. Запрос повторяет
        recalculateTotalReplyCounts из CommentRepository.
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: >-
              WITH RECURSIVE subtree AS (
                  SELECT c.id AS root_id, c.id AS node_id, c.status AS node_status
                  FROM comment.comments c
                  WHERE c.status IN ('PUBLISHED', 'DELETED', 'HIDDEN_BY_BAN')
                  UNION ALL
                  SELECT s.root_id, child.id, child.status
                  FROM subtree s
                  JOIN comment.comments child ON child.parent_id = s.node_id
                  WHERE child.status IN ('PUBLISHED', 'DELETED', 'HIDDEN_BY_BAN')
              )
              UPDATE comment.comments t
              SET total_reply_count = sub.cnt
              FROM (
                  SELECT root_id,
                         COUNT(*) FILTER (WHERE node_status = 'PUBLISHED' AND node_id <> root_id) AS cnt
                  FROM subtree
                  GROUP BY root_id
              ) sub
              WHERE t.id = sub.root_id
                AND t.total_reply_count <> sub.cnt;
