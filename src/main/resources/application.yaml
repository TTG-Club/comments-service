spring:
  application:
    name: comment

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: comment


# Токены выпускает auth-service и подписывает симметричным HMAC-секретом.
# Тот же секрет валидирует subscriber-service (AUTH_SERVICE_JWT_SECRET) — значение общее.
# JWKS/issuer-uri здесь неприменимы: auth-service не публикует набор ключей и не проставляет claim iss.
auth-service:
  jwt-secret: ${AUTH_SERVICE_JWT_SECRET}

# Антиспам на создание комментариев и ответов, на пользователя.
# intervals — минимальный промежуток между комментариями по мере роста серии нарушений:
# сначала 20с, после первого нарушения 60с, после следующего вместо очередного ужесточения
# выдаётся бан на block-duration. Через violation-decay без нарушений серия обнуляется.
comments:
  rate-limit:
    enabled: ${COMMENTS_RATE_LIMIT_ENABLED:true}
    intervals:
      - 20s
      - 60s
    block-duration: 3h
    violation-decay: 1h

